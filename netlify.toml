# Root-level Netlify config for pnpm monorepo
# Netlify auto-detects pnpm when pnpm-lock.yaml is present at root

[build]
  command = "pnpm --filter @medicine-tracker/web build"
  publish = "apps/web/dist"

# Required env vars (set in Netlify dashboard → Site settings → Environment variables):
#   VITE_SUPABASE_URL      = https://your-project.supabase.co
#   VITE_SUPABASE_ANON_KEY = your-anon-key

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker must never be cached
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/registerSW.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

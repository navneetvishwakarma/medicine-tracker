name: EAS Build — Android Preview APK

on:
  workflow_dispatch:        # manual trigger from GitHub UI
  push:
    branches:
      - feature/phase-2
    paths:
      - 'apps/mobile/**'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/mobile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set Supabase secrets in EAS
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas secret:push --scope project --non-interactive \
            --env EXPO_PUBLIC_SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            EXPO_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            || true   # skip if secrets already exist

      - name: Build Android APK (preview)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait
        # --no-wait: build runs on Expo's servers; download link appears at expo.dev/builds
